<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Doğum haritası hesaplayıcı - Doğum tarihi, saati ve yerine göre detaylı natal harita analizi">
  <title>Kozmik Harita — Doğum Haritası Hesaplayıcı</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <canvas id="starfield"></canvas>
  <div id="nebula"></div>

  <!-- NAVİGASYON -->
  <nav class="site-nav">
    <a href="index.html" class="nav-link active">☉ Doğum Haritası</a>
    <a href="synastry.html" class="nav-link">♡ Burç Uyumu</a>
  </nav>

  <section id="hero">
    <div class="hero-content">
      <h1 class="site-title">Kozmik <span class="accent">Harita</span></h1>
      <div class="hero-ornament">
        <span class="line"></span>
        <span>☉ ☽ ☿ ♀ ♂ ♃ ♄</span>
        <span class="line"></span>
      </div>
      <p class="site-subtitle">Doğum Haritası Hesaplayıcı</p>
    </div>

    <div id="formCard">
      <form id="birthForm" autocomplete="off">
        <div class="form-grid">

          <div class="form-group full-width">
            <label>Doğum Tarihi</label>
            <div class="date-inputs">
              <input type="number" id="birthDay" min="1" max="31" placeholder="GG" required>
              <span class="date-sep">/</span>
              <input type="number" id="birthMonth" min="1" max="12" placeholder="AA" required>
              <span class="date-sep">/</span>
              <input type="number" id="birthYear" min="1900" max="2030" placeholder="YYYY" required>
            </div>
          </div>

          <div class="form-group">
            <label>Doğum Saati (24 saat)</label>
            <div class="time-inputs">
              <input type="number" id="birthHour" min="0" max="23" placeholder="SS" required>
              <span class="date-sep">:</span>
              <input type="number" id="birthMinute" min="0" max="59" placeholder="DD" required>
            </div>
          </div>

          <div class="form-group">
            <label for="city">İl</label>
            <select id="city" required>
              <option value="">İl Seçin</option>
            </select>
          </div>

          <div class="form-group full-width">
            <label for="district">İlçe</label>
            <select id="district" disabled>
              <option value="">İlçe Seçin (opsiyonel)</option>
            </select>
          </div>

          <div class="calc-btn-wrapper">
            <button type="button" id="calcBtn">✦ Haritayı Hesapla</button>
          </div>

        </div>
      </form>
    </div>
  </section>

  <section id="results">
    <div id="summaryBox"></div>
    <div class="results-grid">
      <div id="chartContainer"></div>
      <div id="infoPanel"></div>
    </div>
    <div id="interpretationsPanel"></div>
    <div class="recalc-wrapper">
      <button id="recalcBtn">↺ Yeniden Hesapla</button>
    </div>
  </section>

  <footer>
    <p>✦ Kozmik Harita — Placidus ev sistemi ile yüksek hassasiyetli natal harita hesaplaması ✦</p>
  </footer>

  <script src="js/locations.js"></script>
  <script src="js/astro-engine.js"></script>
  <script src="js/interpretations.js"></script>
  <script src="js/chart-renderer.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
